<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#06b6d4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle grid lines (terminal feel) -->
  <g opacity="0.05" stroke="#06b6d4" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Compound spiral / rising chart symbol -->
  <g transform="translate(256, 240)" filter="url(#shadow)">
    <!-- Bar chart rising -->
    <rect x="-120" y="20" width="36" height="60" rx="6" fill="url(#accent)" opacity="0.5"/>
    <rect x="-72" y="-10" width="36" height="90" rx="6" fill="url(#accent)" opacity="0.65"/>
    <rect x="-24" y="-50" width="36" height="130" rx="6" fill="url(#accent)" opacity="0.8"/>
    <rect x="24" y="-80" width="36" height="160" rx="6" fill="url(#accent)" opacity="0.9"/>
    <rect x="72" y="-120" width="36" height="200" rx="6" fill="url(#glow)"/>

    <!-- Trend line -->
    <polyline
      points="-102,20 -54,-10 -6,-50 42,-80 90,-120"
      fill="none"
      stroke="#22d3ee"
      stroke-width="4"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.9"
    />

    <!-- Compound arrow (upward) -->
    <g transform="translate(90, -120)">
      <circle r="14" fill="#22d3ee" opacity="0.3"/>
      <circle r="8" fill="#22d3ee"/>
    </g>
  </g>

  <!-- Magnifying glass overlay (insight) -->
  <g transform="translate(340, 150)" opacity="0.7">
    <circle cx="0" cy="0" r="32" fill="none" stroke="url(#glow)" stroke-width="5"/>
    <line x1="22" y1="22" x2="44" y2="44" stroke="url(#glow)" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Text: CLINSIGHT -->
  <text
    x="256"
    y="380"
    text-anchor="middle"
    font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
    font-size="52"
    font-weight="700"
    letter-spacing="6"
    fill="url(#glow)"
  >CLINSIGHT</text>

  <!-- Subtitle -->
  <text
    x="256"
    y="415"
    text-anchor="middle"
    font-family="'SF Mono', 'Fira Code', monospace"
    font-size="16"
    letter-spacing="3"
    fill="#64748b"
  >SESSION INTELLIGENCE</text>
</svg>
