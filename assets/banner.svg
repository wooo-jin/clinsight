<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#06b6d4" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
  </g>

  <!-- Mini chart icon -->
  <g transform="translate(80, 100)">
    <rect x="-45" y="5" width="14" height="30" rx="3" fill="url(#accent)" opacity="0.5"/>
    <rect x="-25" y="-10" width="14" height="45" rx="3" fill="url(#accent)" opacity="0.65"/>
    <rect x="-5" y="-25" width="14" height="60" rx="3" fill="url(#accent)" opacity="0.8"/>
    <rect x="15" y="-40" width="14" height="75" rx="3" fill="url(#accent)" opacity="0.9"/>
    <rect x="35" y="-55" width="14" height="90" rx="3" fill="url(#glow)"/>
    <polyline
      points="-38,5 -18,-10 2,-25 22,-40 42,-55"
      fill="none" stroke="#22d3ee" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round" opacity="0.8"
    />
    <circle cx="42" cy="-55" r="5" fill="#22d3ee"/>
  </g>

  <!-- Magnifier -->
  <g transform="translate(135, 55)" opacity="0.5">
    <circle cx="0" cy="0" r="12" fill="none" stroke="url(#glow)" stroke-width="2.5"/>
    <line x1="8" y1="8" x2="16" y2="16" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text
    x="280"
    y="95"
    font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
    font-size="56"
    font-weight="700"
    letter-spacing="5"
    fill="url(#glow)"
  >CLINSIGHT</text>

  <!-- Subtitle -->
  <text
    x="280"
    y="128"
    font-family="'SF Mono', 'Fira Code', monospace"
    font-size="16"
    letter-spacing="2"
    fill="#64748b"
  >Claude Code Session Intelligence</text>

  <!-- Version badge -->
  <g transform="translate(280, 140)">
    <rect width="52" height="20" rx="4" fill="#06b6d4" opacity="0.15"/>
    <text x="26" y="14" text-anchor="middle" font-family="monospace" font-size="11" fill="#22d3ee">v0.1.0</text>
  </g>
</svg>
